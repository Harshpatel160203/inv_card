<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma Rose · Baby Shower Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--sage:#8A9E8C;--sage-deep:#4D6B52;--sage-mist:#b8c9ba;--gold:#C4A882;--gold-light:#ddc9a8;--parchment:#F7F3EE;--parchment-dark:#EDE8E0;--linen:#BDB5A6;--ink:#3a4f3c;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--parchment-dark);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.page{min-height:100vh;width:100%;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* PAGE 1 */
#page1{background:linear-gradient(160deg,#f0ece4 0%,#f7f3ee 40%,#eae5dc 100%);flex-direction:column;padding:40px 20px;}
.card{position:relative;width:min(480px,92vw);background:var(--parchment);border-radius:2px;box-shadow:0 8px 24px rgba(77,107,82,0.1),0 32px 80px rgba(77,107,82,0.12);padding:56px 44px 52px;z-index:10;text-align:center;}
.eyebrow{font-family:'Cormorant SC',serif;font-size:8.5px;letter-spacing:0.38em;color:var(--linen);margin-bottom:22px;}
.headline{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(30px,6vw,38px);color:var(--sage-deep);margin-bottom:4px;}
.subheadline{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(18px,3.5vw,22px);color:var(--sage-deep);margin-bottom:24px;}
.honoree-name{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(26px,5vw,34px);color:var(--ink);margin-bottom:18px;}
.rsvp-btn{display:inline-block;font-family:'Cormorant SC',serif;font-size:10px;letter-spacing:0.35em;color:var(--parchment);background:var(--sage-deep);padding:13px 36px;border:none;cursor:pointer;transition:all 0.4s ease;}

/* PAGE 2 */
#page2{background:linear-gradient(175deg,var(--sage-deep) 0%,#2e4a33 100%);flex-direction:column;padding:60px 20px;}
.info-section{background:rgba(247,243,238,0.07);backdrop-filter:blur(8px);border:0.75px solid rgba(247,243,238,0.15);border-radius:2px;padding:36px 38px;margin-bottom:16px;width:min(540px,94vw);transition:transform 0.3s ease;}
.name-input, .note-input{width:100%;background:rgba(247,243,238,0.07);border:0.75px solid rgba(247,243,238,0.2);padding:14px;color:var(--parchment);outline:none;margin-bottom:10px;font-family:'Cormorant Garamond', serif; font-size: 16px;}
.rsvp-option{width:100%;text-align:left;padding:16px;background:transparent;border:0.75px solid rgba(247,243,238,0.2);color:var(--parchment);cursor:pointer;margin-bottom:8px;transition: 0.3s;}
.rsvp-option.selected{border-color:var(--gold);background:rgba(196,168,130,0.18);}
.submit-btn{width:100%;padding:16px;background:var(--gold);border:none;cursor:pointer;font-family:'Cormorant SC',serif;letter-spacing:0.2em; font-weight: bold;}
.confirmation{display:none;color:var(--parchment);text-align:center;}
.show{display:block !important;}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<section id="page1" class="page">
  <div class="card">
    <p class="eyebrow">Please Join Us to Celebrate</p>
    <h1 class="headline">A Little Wild One</h1>
    <h2 class="subheadline">is on the Way</h2>
    <h3 class="honoree-name">Emma Rose Sullivan</h3>
    <button class="rsvp-btn" onclick="scrollToPage2()"><span>RSVP & Details ↓</span></button>
  </div>
</section>

<section id="page2" class="page">
  <div class="info-section">
    <h3 style="color:white; margin-bottom:20px; font-family:'Cormorant Garamond'; font-size: 28px; font-style: italic;">Will you join us?</h3>
    <input id="guestName" class="name-input" type="text" placeholder="Your full name…" />
    
    <div id="rsvpOptions">
      <button class="rsvp-option" onclick="selectOption(this,'yes')">Joyfully Accepts 🌿</button>
      <button class="rsvp-option" onclick="selectOption(this,'maybe')">Will Try to Make It 🌸</button>
      <button class="rsvp-option" onclick="selectOption(this,'no')">Sends Love from Afar 💌</button>
    </div>

    <div id="guestRow" style="display:none; color:white; margin:20px 0; font-family: 'DM Sans';">
      <label style="letter-spacing: 0.1em; font-size: 12px; text-transform: uppercase;">Number of guests</label>
      <div style="margin-top: 10px; display: flex; align-items: center; gap: 15px;">
        <button onclick="changeCount(-1)" style="width:30px; height:30px; border-radius: 50%; border: 1px solid var(--gold); background: transparent; color: white; cursor: pointer;">-</button>
        <span id="guestCount" style="font-size: 20px; font-family: 'Cormorant Garamond';">1</span>
        <button onclick="changeCount(1)" style="width:30px; height:30px; border-radius: 50%; border: 1px solid var(--gold); background: transparent; color: white; cursor: pointer;">+</button>
      </div>
    </div>

    <textarea id="guestNote" class="note-input" placeholder="Leave a note for the mama-to-be..." style="display:none; height: 80px;"></textarea>
    
    <button id="submitBtn" class="submit-btn" style="display:none;" onclick="submitRSVP()">Send My RSVP ✦</button>
    
    <div class="confirmation" id="confirmation">
      <h2 style="font-family: 'Cormorant Garamond'; font-style: italic; font-size: 32px;">Thank you!</h2>
      <p id="confSub" style="margin-top: 10px; opacity: 0.8;"></p>
    </div>
  </div>
</section>

<script>
// --- AIRTABLE CONFIGURATION ---
const AIRTABLE_TOKEN = 'patJj0YU6gIesGf4N.4f5f8a97554a552823f2ee11387b92303a0dc3cdbd09e35517b89be37b7fe977';
const BASE_ID        = 'apprZvoV7VQImiqPd';
const TABLE_ID       = 'tblnbV5IveARCkOP2';

let selectedOptionType = null;
let guestCountValue = 1;

// --- PARTICLE SYSTEM ---
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor(){ this.reset(); }
  reset(){
    this.x = Math.random()*W; this.y = Math.random()*H;
    this.size = Math.random()*1.5+0.5; this.speedY = -(Math.random()*0.3+0.1);
    this.speedX = (Math.random()-0.5)*0.1; this.opacity = 0;
    this.maxOpacity = Math.random()*0.4; this.life = 0;
    this.maxLife = Math.random()*300+200;
  }
  update(){
    this.life++;
    if(this.life<40) this.opacity=(this.life/40)*this.maxOpacity;
    else if(this.life>this.maxLife-40) this.opacity=((this.maxLife-this.life)/40)*this.maxOpacity;
    else this.opacity=this.maxOpacity;
    this.y += this.speedY; this.x += this.speedX;
    if(this.life >= this.maxLife) this.reset();
  }
  draw(){
    ctx.save(); ctx.globalAlpha = this.opacity; ctx.fillStyle = '#C4A882';
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
  }
}
for(let i=0;i<60;i++){ let p=new Particle(); p.life=Math.random()*p.maxLife; particles.push(p); }
(function loop(){ ctx.clearRect(0,0,W,H); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); })();

// --- FORM LOGIC ---
function selectOption(btn, type){
  document.querySelectorAll('.rsvp-option').forEach(o=>o.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOptionType = type;
  document.getElementById('guestRow').style.display = (type==='no') ? 'none' : 'block';
  document.getElementById('guestNote').style.display = 'block';
  document.getElementById('submitBtn').style.display = 'block';
}

function changeCount(delta){
  guestCountValue = Math.max(1, Math.min(10, guestCountValue+delta));
  document.getElementById('guestCount').textContent = guestCountValue;
}

async function submitRSVP(){
  const name = document.getElementById('guestName').value.trim();
  if(!name) { alert("Please enter your name"); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Sending...';
  btn.disabled = true;

  const labels = { yes:'Joyfully Accepts', maybe:'Will Try to Make It', no:'Sends Love from Afar' };
  
  // Date formatting for Airtable "Date" field (YYYY-MM-DD)
  const today = new Date().toISOString().split('T')[0];

  try {
    const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`, {
      method: 'POST',
      headers: { 
        'Authorization': `Bearer ${AIRTABLE_TOKEN}`, 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({ 
        records: [{ 
          fields: {
            "Name": name,
            "Attending": labels[selectedOptionType],
            "Guests": (selectedOptionType === 'no' ? 0 : guestCountValue),
            "Note": document.getElementById('guestNote').value.trim() || "—",
            "Submitted": today
          } 
        }] 
      })
    });

    if(!response.ok) {
        const errData = await response.json();
        throw new Error(errData.error.message || 'Airtable Error');
    }

    // Hide UI
    ['guestName','rsvpOptions','guestRow','guestNote','submitBtn'].forEach(id=>{
      document.getElementById(id).style.display='none';
    });
    
    document.getElementById('confSub').textContent = `Response saved for ${name.split(' ')[0]}. We can't wait!`;
    document.getElementById('confirmation').classList.add('show');

  } catch(err){
    console.error(err);
    btn.textContent = '⚠ ' + err.message;
    btn.disabled = false;
  }
}

function scrollToPage2(){ document.getElementById('page2').scrollIntoView({behavior:'smooth'}); }
</script>
</body>
</html>
